<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind CSS</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-5">

    <!-- Heading -->
    <h1 class="text-center text-3xl font-bold bg-yellow-300 text-black p-4  border-4 border-red-500 rounded-lg border-t-5">
        Sample Heading
    </h1>

    <!-- Padding Example -->
    <div class="bg-gray-200 p-4 text-red-500 text-center text-2xl font-bold mt-8">
        Padding Example
    </div>

    <!-- Margin Example -->
    <div class="bg-orange-500 text-center text-2xl font-bold m-8 p-4">
        Margin Example
    </div>

    <!-- Width & Height Example -->
    <div class="w-full h-20 bg-green-500 flex items-center justify-center text-white font-bold">
        Width & Height
    </div>

    <!-- Border Example -->
    <div class="border-4 rounded-lg p-4 m-8 text-center">
        Border & Border Radius
    </div>

    <!-- Flexbox Example -->
    <div class="flex justify-center gap-4 bg-pink-200 p-4">
        <div class="bg-blue-500 text-white p-4 border-4">
            Box 1
        </div>

        <div class="bg-red-500 text-white p-4 border-4">
            Box 2
        </div>
    </div>

    <!-- Grid Example -->
    <div class="grid grid-cols-3 gap-4 mt-8">
        <div class="bg-red-500 p-4 text-center text-white">1</div>
        <div class="bg-green-500 p-4 text-center text-white">2</div>
        <div class="bg-blue-500 p-4 text-center text-white">3</div>
    </div>

    <!-- Button Example -->
    <div class="mt-8">
        <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-700">
            Click Me
        </button>
    </div>

</body>
</html>
