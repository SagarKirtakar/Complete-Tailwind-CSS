<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
        <h2 class="text-3xl font-bold mb-6 text-center text-gray-700">Login</h2>
        <form action="">
                <div class="mb-4">
                  <label for="email" class="block text-gray-600 font-semibold mb-2">Email</label>
                  <input type="email" name="email" id="email" placeholder="Email"
                  class="w-full border px-4 py-2 rounded-lg border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                    <div class="mb-4">
                        <label for="pass" class="block text-gray-600 font-semibold mb-2">Password</label>
                        <input type="password" name="pass" id="pass" placeholder="Password"  class="w-full border px-4 py-2 rounded-lg border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                   <div class="flex items-center justify-between mb-6">
                         <label class="flex items-center text-sm text-gray-600">
                            <input type="checkbox" class="mr-2"> Remember me
                        </label> 
                         <a href="#" class="text-sm text-blue-600 hover:underline font-semibold">Forgot Password</a>
                   </div>

                   <button type="submit" class="w-full text-white bg-blue-600 py-2 text-center border rounded-lg hover:bg-blue-700 transition-colors duration-200 font-semibold">Login</button>
                <p class="text-center mt-6 text-sm text-gray-600">
                    Don't have an account?
                    <a href="#"  class="text-sm text-blue-600 hover:underline font-semibold">Register here</a>
                </p>
        </form>
    </div>
</body>
</html>
